<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 16px; background: #1A1E28; font-family: 'DM Sans', sans-serif; }
  .label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #394050; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .card { background: #111318; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 16px 20px; }
  .meta { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #394050; margin-top: 8px; }
  .card-xs { box-shadow: 0 1px 2px rgba(0,0,0,0.5); }
  .card-sm { box-shadow: 0 2px 6px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.6); }
  .card-md { box-shadow: 0 4px 16px rgba(0,0,0,0.45), 0 2px 4px rgba(0,0,0,0.5); }
  .card-lg { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.4); }
  .card-xl { box-shadow: 0 16px 64px rgba(0,0,0,0.6), 0 8px 16px rgba(0,0,0,0.4); }
  .card-glow { box-shadow: 0 0 24px rgba(37, 99, 235, 0.35); border-color: rgba(37,99,235,0.3); }
  .card-crimson { box-shadow: 0 0 24px rgba(239, 34, 34, 0.3); border-color: rgba(239,34,34,0.3); }
  .title { font-size: 12px; font-weight: 600; color: #8B95A8; }
</style>
</head>
<body>
<div class="label">Elevation & Shadow System</div>
<div class="row">
  <div>
    <div class="card card-xs"><div class="title">shadow-xs</div></div>
    <div class="meta">0 1px 2px · surface layer</div>
  </div>
  <div>
    <div class="card card-sm"><div class="title">shadow-sm</div></div>
    <div class="meta">cards at rest</div>
  </div>
  <div>
    <div class="card card-md"><div class="title">shadow-md</div></div>
    <div class="meta">cards on hover</div>
  </div>
  <div>
    <div class="card card-lg"><div class="title">shadow-lg</div></div>
    <div class="meta">panels, drawers</div>
  </div>
  <div>
    <div class="card card-xl"><div class="title">shadow-xl</div></div>
    <div class="meta">modals, dialogs</div>
  </div>
  <div>
    <div class="card card-glow"><div class="title" style="color:#60A5FA">glow-cobalt</div></div>
    <div class="meta">active state, CTA</div>
  </div>
  <div>
    <div class="card card-crimson"><div class="title" style="color:#F84B4B">glow-crimson</div></div>
    <div class="meta">danger, alert</div>
  </div>
</div>
</body>
</html>
