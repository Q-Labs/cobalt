<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 14px 16px; background: #080A0F; font-family: 'DM Sans', sans-serif; }
  .label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #394050; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  /* Sidebar nav */
  .nav-sidebar { background: #0F1117; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 10px; width: 160px; }
  .nav-logo { display: flex; align-items: center; gap: 7px; padding: 4px 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 8px; }
  .nav-logo-mark { width: 22px; height: 22px; background: #2563EB; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk',sans-serif; font-weight: 700; font-size: 12px; color: #fff; }
  .nav-logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; color: #EEF0F5; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; font-size: 12px; color: #8B95A8; cursor: pointer; transition: background 0.1s; }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: #EEF0F5; }
  .nav-item.active { background: rgba(37,99,235,0.14); color: #60A5FA; }
  .nav-icon { width: 14px; height: 14px; background: currentColor; border-radius: 3px; opacity: 0.6; flex-shrink: 0; }
  .nav-section { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #394050; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 8px 3px; }
  .nav-badge { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 9px; background: rgba(37,99,235,0.2); color: #60A5FA; padding: 1px 5px; border-radius: 9999px; }

  /* Top nav bar */
  .nav-top { background: #0F1117; border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 8px 14px; display: flex; align-items: center; gap: 12px; }
  .nav-top-logo { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; color: #EEF0F5; letter-spacing: -0.02em; }
  .nav-top-links { display: flex; gap: 2px; margin-left: 16px; }
  .nav-top-link { font-size: 12px; color: #8B95A8; padding: 4px 10px; border-radius: 5px; cursor: pointer; }
  .nav-top-link:hover { color: #EEF0F5; background: rgba(255,255,255,0.04); }
  .nav-top-link.active { color: #EEF0F5; background: rgba(255,255,255,0.07); }
  .nav-top-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .nav-top-btn { background: #2563EB; color: #fff; font-family: 'DM Sans',sans-serif; font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 5px; border: none; cursor: pointer; }
  .nav-top-avatar { width: 26px; height: 26px; background: #1E3A8A; border-radius: 50%; border: 1.5px solid rgba(37,99,235,0.4); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk',sans-serif; font-size: 10px; font-weight: 700; color: #60A5FA; }
</style>
</head>
<body>
  <div class="label">Sidebar Navigation</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;margin-bottom:16px">
    <div class="nav-sidebar">
      <div class="nav-logo">
        <div class="nav-logo-mark">Q</div>
        <div class="nav-logo-text">Quincy OS</div>
      </div>
      <div class="nav-section">Command</div>
      <div class="nav-item active"><span class="nav-icon"></span>Dashboard<span class="nav-badge">3</span></div>
      <div class="nav-item"><span class="nav-icon"></span>Missions</div>
      <div class="nav-item"><span class="nav-icon"></span>Timeline</div>
      <div class="nav-section">Systems</div>
      <div class="nav-item"><span class="nav-icon"></span>Modules</div>
      <div class="nav-item"><span class="nav-icon"></span>Signals</div>
      <div class="nav-item"><span class="nav-icon"></span>Settings</div>
    </div>
  </div>
  <div class="label">Top Navigation Bar</div>
  <div class="nav-top">
    <div class="nav-top-logo">Quincy OS</div>
    <div class="nav-top-links">
      <div class="nav-top-link active">Dashboard</div>
      <div class="nav-top-link">Missions</div>
      <div class="nav-top-link">Portfolio</div>
      <div class="nav-top-link">Signals</div>
    </div>
    <div class="nav-top-actions">
      <button class="nav-top-btn">Deploy</button>
      <div class="nav-top-avatar">QI</div>
    </div>
  </div>
</body>
</html>
