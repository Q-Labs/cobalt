<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #080A0F; }
  .row { border-bottom: 1px solid rgba(255,255,255,0.06); padding: 10px 0; display: flex; align-items: baseline; gap: 16px; }
  .row:last-child { border-bottom: none; }
  .meta { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #394050; width: 80px; flex-shrink: 0; line-height: 1.4; }
  .sample { font-family: 'Space Grotesk', sans-serif; color: #EEF0F5; line-height: 1.15; }
  .tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #2563EB; background: rgba(37,99,235,0.12); padding: 1px 5px; border-radius: 3px; margin-left: auto; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">display-2xl<br>96px / 700</div>
    <div class="sample" style="font-size:48px;font-weight:700;letter-spacing:-0.04em">Quincy OS</div>
    <div class="tag">display</div>
  </div>
  <div class="row">
    <div class="meta">display-xl<br>72px / 700</div>
    <div class="sample" style="font-size:38px;font-weight:700;letter-spacing:-0.03em">Command Center</div>
    <div class="tag">display</div>
  </div>
  <div class="row">
    <div class="meta">display-lg<br>60px / 700</div>
    <div class="sample" style="font-size:30px;font-weight:700;letter-spacing:-0.025em">Active Missions</div>
    <div class="tag">display</div>
  </div>
  <div class="row">
    <div class="meta">h1<br>30px / 700</div>
    <div class="sample" style="font-size:22px;font-weight:700;letter-spacing:-0.02em">Capability Stack</div>
    <div class="tag">heading</div>
  </div>
  <div class="row">
    <div class="meta">h2<br>24px / 600</div>
    <div class="sample" style="font-size:18px;font-weight:600;letter-spacing:-0.015em">Installed Modules</div>
    <div class="tag">heading</div>
  </div>
  <div class="row">
    <div class="meta">h3<br>20px / 600</div>
    <div class="sample" style="font-size:15px;font-weight:600">Patch Notes — v2.4</div>
    <div class="tag">heading</div>
  </div>
  <div class="row">
    <div class="meta">h6 / overline<br>12px / 600</div>
    <div class="sample" style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#556070;font-family:'DM Sans',sans-serif">Section Label</div>
    <div class="tag">overline</div>
  </div>
</body>
</html>
