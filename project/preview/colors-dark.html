<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #1A1E28; font-family: 'DM Sans', sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .swatch { height: 48px; border-radius: 4px; position: relative; }
  .swatch:hover::after { content: attr(title); position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: #0F1117; color: #EEF0F5; font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; font-family: 'JetBrains Mono', monospace; pointer-events: none; z-index: 10; }
  .row { margin-bottom: 12px; }
  .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #556070; margin-bottom: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
  .name { font-size: 9px; color: #394050; margin-top: 2px; text-align: center; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="label">Black / Charcoal</div>
  <div class="grid">
    <div><div class="swatch" style="background:#F4F5F7" title="#F4F5F7"></div><div class="name">50</div></div>
    <div><div class="swatch" style="background:#E5E7EC" title="#E5E7EC"></div><div class="name">100</div></div>
    <div><div class="swatch" style="background:#C9CDD8" title="#C9CDD8"></div><div class="name">200</div></div>
    <div><div class="swatch" style="background:#9AA0B0" title="#9AA0B0"></div><div class="name">300</div></div>
    <div><div class="swatch" style="background:#6B7283" title="#6B7283"></div><div class="name">400</div></div>
    <div><div class="swatch" style="background:#434959" title="#434959"></div><div class="name">500</div></div>
    <div><div class="swatch" style="background:#282D3A" title="#282D3A"></div><div class="name">600</div></div>
    <div><div class="swatch" style="background:#1A1E28" title="#1A1E28"></div><div class="name">700</div></div>
    <div><div class="swatch" style="background:#111318;border:1px solid #252A38" title="#111318"></div><div class="name">800</div></div>
    <div><div class="swatch" style="background:#080A0F;border:1px solid #252A38" title="#080A0F"></div><div class="name">900</div></div>
    <div><div class="swatch" style="background:#040508;border:1px solid #252A38" title="#040508"></div><div class="name">950</div></div>
  </div>
</div>

    <div><div class="swatch" style="background:#BFDBFF" title="#BFDBFF"></div><div class="name">100</div></div>
    <div><div class="swatch" style="background:#93C1FF" title="#93C1FF"></div><div class="name">200</div></div>
    <div><div class="swatch" style="background:#60A5FA" title="#60A5FA"></div><div class="name">300</div></div>
    <div><div class="swatch" style="background:#3B82F6" title="#3B82F6"></div><div class="name">400</div></div>
    <div><div class="swatch" style="background:#2563EB" title="#2563EB"></div><div class="name">500 ★</div></div>

    <div><div class="swatch" style="background:#080E24;border:1px solid #252A38" title="#080E24"></div><div class="name">950</div></div>

</div>

    <div><div class="swatch" style="background:#6B0B0B" title="#6B0B0B"></div><div class="name">800</div></div>

    <div><div class="swatch" style="background:#475569" title="#475569"></div><div class="name">600</div></div>

</body>
</html>
